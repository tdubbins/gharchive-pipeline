services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1

    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      -  MINIO_ROOT_USER=${MINIO_ROOT_USER}
      -  MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    
volumes:
  minio-data: